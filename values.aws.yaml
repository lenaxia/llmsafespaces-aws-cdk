# AWS-targeted Helm overrides for llmsafespaces.
#
# Dynamic values (postgres host, redis host, certificate ARN, image refs,
# hostname, ingress annotations) are passed via --set by
# scripts/install-chart.sh. This file holds only the static AWS-shaped
# overrides.

api:
  replicaCount: 1
  image:
    pullPolicy: IfNotPresent
  config:
    # allowedOrigins set via --set in scripts/install-chart.sh
    logging:
      level: info
      development: false
  ingress:
    # API is reached via the frontend ingress at /api; no separate API
    # ingress needed.
    enabled: false

controller:
  replicaCount: 1
  image:
    pullPolicy: IfNotPresent
  inferenceRelay:
    enabled: false

# Inference Relay URL. Empty disables the CF Worker relay path and lets
# the workspace agent route opencode directly to opencode.ai/zen/v1 using
# the built-in "public" anonymous key (free-tier Zen access).
#
# The chart default (https://relay.safespaces.dev) is the maintainer's
# private CF Worker that requires an out-of-band shared secret; without
# that secret, every free-model call returns 403 and the UI shows
# "Agent is restarting (credential change, OOM, or crash)".
#
# See lenaxia/LLMSafeSpaces#474.
inferenceRelayURL: ""

frontend:
  enabled: true
  image:
    pullPolicy: IfNotPresent
  ingress:
    enabled: true
    className: alb
    # host + certificate-arn injected via --set at install time
    #
    # The chart's frontend-ingress.yaml hard-codes a `tls:` block that
    # references a K8s TLS Secret (the nginx-ingress + cert-manager pattern).
    # ALB terminates TLS via the certificate-arn annotation, not a K8s
    # Secret, so we disable the chart's TLS block and rely on the
    # annotation.
    tls: false
    annotations:
      kubernetes.io/ingress.class: alb
      alb.ingress.kubernetes.io/scheme: internet-facing
      alb.ingress.kubernetes.io/target-type: ip
      alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
      alb.ingress.kubernetes.io/ssl-redirect: '443'
      alb.ingress.kubernetes.io/healthcheck-path: /livez

mcp:
  # ghcr.io/lenaxia/llmsafespaces/mcp image isn't published yet.
  enabled: false

# Postgres connection (host comes via --set; password via external-secrets
# materializing the K8s `llmsafespaces-credentials` Secret).
postgresql:
  port: 5432
  user: llmsafespaces_admin   # matches rds.Credentials.fromGeneratedSecret in DataStack
  database: llmsafespaces
  sslMode: require

# Valkey connection (host comes via --set).
redis:
  port: 6379
  db: 0

# Reference the K8s Secret materialized by external-secrets-operator
# (PlatformStack creates the ExternalSecret CR pointing at SM).
externalSecret:
  create: false
  existingSecret: llmsafespaces-credentials

crds:
  install: true

# Cluster-scoped RBAC. The controller's default mode is cluster-wide
# (watchNamespaces empty); namespace-scoped RBAC would cause the
# controller-runtime informer to fail syncing cluster-scoped resources.
rbac:
  scope: cluster

# Validating webhooks rely on cert-manager (installed by ClusterStack).
webhooks:
  enabled: true
  failurePolicy: Fail
  allowedImageRegistries:
    - "ghcr.io/lenaxia/"

# Default-deny NetworkPolicies for workspace pods.
networkPolicy:
  enabled: true

# Monitoring stack disabled by default; install kube-prometheus-stack
# separately and flip on after.
monitoring:
  enabled: false

# Enable gVisor (runsc) for workspace pods. RuntimeClass `gvisor` is
# created by the chart (templates/runtime-class.yaml); the runsc binary
# is installed by the CDK ClusterStack's gvisor-installer DaemonSet.
gvisor:
  enabled: true
  defaultRuntimeClass: gvisor
