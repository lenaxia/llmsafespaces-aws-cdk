name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: cdk synth (mvp tier)
        run: |
          # Use placeholder context so synth doesn't try to look up real AWS resources.
          npx cdk synth --quiet \
            -c llmsafespaces:account=123456789012 \
            -c llmsafespaces:hostname=test.example.com \
            -c llmsafespaces:adminRoleArn=arn:aws:iam::123456789012:role/Admin \
            -c llmsafespaces:tier=mvp

      - name: cdk synth (prod tier)
        run: |
          npx cdk synth --quiet \
            -c llmsafespaces:account=123456789012 \
            -c llmsafespaces:hostname=test.example.com \
            -c llmsafespaces:adminRoleArn=arn:aws:iam::123456789012:role/Admin \
            -c llmsafespaces:tier=prod
